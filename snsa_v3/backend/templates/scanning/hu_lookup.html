{% extends "base.html" %}
{% block title %}Scan HU — SNSA{% endblock %}

{% block content %}
<div class="mt-4">
    <h1 class="text-2xl font-bold text-gray-800 mb-4">Scan Handling Unit</h1>

    <form hx-post="{% url 'hu-lookup-page' %}"
          hx-target="#feedback"
          hx-swap="innerHTML"
          class="space-y-3">
        {% csrf_token %}

        <input type="text"
               name="hu_number"
               id="hu-input"
               autofocus
               autocomplete="off"
               placeholder="Scan or type HU number"
               class="w-full text-2xl p-4 border-2 border-gray-300 rounded-lg
                      focus:border-blue-600 focus:ring-2 focus:ring-blue-200
                      font-mono tracking-wide">

        <button type="submit"
                class="w-full bg-blue-700 text-white text-xl py-4 rounded-lg
                       hover:bg-blue-800 active:bg-blue-900 transition font-bold">
            Load HU
        </button>
    </form>

    <div id="feedback" class="mt-4"></div>
</div>
{% endblock %}
