{# Feedback partial for HU lookup form errors #}
{% if error %}
<div class="flex items-start gap-3 p-4 bg-red-50 border border-red-200 rounded-lg"
     x-data x-init="setTimeout(() => $el.remove(), 6000)">
    <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0
                 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10
                 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75
                 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/>
    </svg>
    <div>
        <p class="text-sm font-semibold text-red-800">{{ error }}</p>
        {% if code %}
        <p class="text-xs text-red-500 mt-0.5 font-mono">{{ code }}</p>
        {% endif %}
    </div>
</div>
{% endif %}
