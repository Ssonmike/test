{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNSA — Access</title>
    <link rel="stylesheet" href="{% static 'vendor/tailwind.min.css' %}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm">

    <!-- Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-900 rounded-2xl mb-4">
            <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 01-1.125-1.125v-4.5z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0113.5 9.375v-4.5z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M13.5 14.625h.008v.008H13.5v-.008zm3.75 0h.008v.008h-.008v-.008zm0 3.75h.008v.008h-.008v-.008z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">SNSA</h1>
        <p class="text-sm text-gray-500 mt-1">Serial Number Scanning App</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

        {% if form.errors %}
        <div class="mb-5 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2">
            <svg class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/>
            </svg>
            <p class="text-sm text-red-700">User or password incorrects.</p>
        </div>
        {% endif %}

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1.5">User</label>
                <input type="text" name="username" id="id_username" autofocus autocomplete="username"
                       class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-gray-900
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password"
                       class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-gray-900
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base">
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <button type="submit"
                    class="w-full bg-blue-900 text-white py-3 rounded-lg font-semibold
                           hover:bg-blue-800 active:bg-blue-950 transition text-base mt-2">
                Log in
            </button>
        </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">GEODIS · SNSA v2.0</p>
</div>

</body>
</html>
